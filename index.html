<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 塔罗占星师</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>✨ 命运的四牌阵</h1>
    <p class="subtitle">洞见过去、现在、对方与未来</p>

    <!-- 控制面板：输入问题和 API Key -->
    <div class="control-panel">
      <div class="input-group">
        <label>你心中的疑惑是什么？</label>
        <input type="text" id="questionInput" placeholder="例如：我最近和他吵架了，我们还能复合吗？">
      </div>
      <div class="input-group">
        <label>输入你的 OpenAI API Key（用于 AI 解读）：</label>
        <input type="password" id="apiKeyInput" placeholder="sk-...">
      </div>
      <button id="drawBtn" onclick="startDivination()">点击抽取四张牌</button>
    </div>

    <!-- 牌阵展示区 -->
    <div class="spread-container" id="spreadContainer">
      <!-- 这里的 4 张牌，我们稍后会用 JavaScript 自动生成出来 -->
    </div>

    <!-- 加载动画和解读结果区域 -->
    <div id="loadingBox" class="loading-box">🌌 宇宙磁场连接中，AI 占星师正在解读...</div>
    <div class="reading-box" id="readingBox"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
