<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 塔罗占星师</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

  <!-- 深夜模式遮罩 -->
  <div id="nightOverlay" class="night-overlay"></div>
  <canvas id="starfield"></canvas>

  <!-- 修复后的本地音效源 (换了更稳定的 CDN) -->
  <audio id="bgMusic" loop src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_244dc1f162.mp3" preload="auto"></audio>
  <audio id="drawSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3" preload="auto"></audio>
  <audio id="revealSound" src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_dc39bde807.mp3" preload="auto"></audio>

  <button id="musicToggle" class="music-btn" onclick="toggleMusic()">🎵 灵性环境音</button>
  <button id="dailyBtn" class="daily-btn" onclick="startDailyDraw()">✨ 今日运势签</button>

  <div class="container" id="captureArea">
    <h1 id="mainTitle">✨ 命运的星盘</h1>
    <p id="mainSubtitle" class="subtitle">倾听宇宙的回音，洞见灵魂的轨迹</p>

    <!-- 控制面板 -->
    <div class="control-panel" id="controlPanel">
      <!-- 删除了姓名输入框，只保留核心问题 -->
      <div class="input-group">
        <label>你心中的疑惑是什么？</label>
        <input type="text" id="questionInput" placeholder="越具体，星空的启示越深刻...">
      </div>
      
      <div class="input-group">
        <label>请选择星空牌阵：</label>
        <select id="spreadSelect" onchange="renderSpread()">
          <optgroup label="基础指引 (免费体验)">
            <option value="single">单牌神谕 (1张：直觉指引)</option>
            <option value="yesno">是非决断阵 (3张：支持/反对/答案)</option>
            <option value="time">时间之流 (3张：过去/现在/未来)</option>
          </optgroup>
          <optgroup label="👑 深度专栏 (打赏解锁)">
            <option value="relationship">情感透视阵 (4张：你/对方/阻碍/未来)</option>
            <option value="career">财富事业阵 (4张：现状/机遇/风险/走向)</option>
            <option value="choice">二选一岔路阵 (5张：现状/选A/选B/A结局/B结局)</option>
            <option value="cross" selected>灵感十字阵 (5张：核心/阻碍/目标/潜意识/结局)</option>
          </optgroup>
        </select>
      </div>
      <!-- 第一步：洗牌 -->
      <button id="startBtn" class="main-btn" onclick="startShuffling()">开始净化与洗牌</button>
    </div>

    <!-- VIP 弹窗保持不变 -->
    <div id="vipModal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <h3>👑 解锁深度命盘</h3>
        <p style="font-size: 14px; margin-bottom: 10px;">高级牌阵将触发超长专业解析，请交换一点能量以开启星空的指引。</p>
        <p style="font-size: 15px; color: #f9d342; font-weight: bold; margin-bottom: 20px;">👉 请长按或扫码赞赏 1 元</p>
        <div class="qr-container">
          <img src="https://i.postimg.cc/vBRq8rJn/IMG-9022.jpg" alt="微信赞赏码">
        </div>
        <p style="font-size: 12px; color: #a8b2d1; margin-top: 15px;">（赞赏完成后，请点击下方按钮验证状态）</p>
        <div class="modal-btns">
          <button onclick="closeVipModal()" class="cancel-btn">返回修改</button>
          <button id="vipConfirmBtn" onclick="confirmVip()" class="confirm-btn">✅ 我已赞赏，开启</button>
        </div>
      </div>
    </div>

    <!-- 洗牌动画区 (新增) -->
    <div id="shuffleArea" class="deck-area" style="display: none; align-items: center; justify-content: center; flex-direction: column;">
       <h3 class="ritual-text" style="animation: pulseText 1s infinite;">正在将你的潜意识注入牌堆...</h3>
       <div class="shuffling-deck"></div>
    </div>

    <!-- 冥想遮罩 -->
    <div id="meditationOverlay" class="meditation-overlay" style="display: none;">
      <div class="breathe-circle"></div>
      <p id="breatheText" class="breathe-text">深呼吸...将精神集中在你的问题上...</p>
    </div>

    <!-- 交互抽牌区 -->
    <div id="deckArea" class="deck-area" style="display: none;">
      <h3 id="instructionText" class="ritual-text">请凭直觉划动抽取 <span id="cardsLeft">0</span> 张牌</h3>
      <div class="fan-deck" id="fanDeck"></div>
    </div>

    <!-- 朋友圈日签专属展示区 (改回 Emoji 设计) -->
    <div id="dailyCardArea" class="daily-card-area" style="display: none;">
        <div class="daily-title">今日塔罗神谕</div>
        <div class="daily-date" id="dailyDate"></div>
        <div class="daily-emoji-card">
           <div id="dailyEmoji" class="daily-emoji">✨</div>
           <div id="dailyName" class="daily-name">牌名</div>
        </div>
        <div class="daily-quote" id="dailyQuote">正在连线宇宙生成箴言...</div>
    </div>

    <!-- 常规牌阵展示区 -->
    <div class="spread-container" id="spreadContainer"></div>

    <!-- 长文解析流式输出区 -->
    <div class="reading-wrapper" id="readingWrapper" style="display: none;">
      <div class="reading-box" id="readingBox">
        <h4 id="loadingText" style="margin-top:0; color:#f9d342;">🌌 宇宙磁场连接中，星空正在落笔...</h4>
        <div id="streamContent" class="stream-content"></div>
        <span id="cursor" class="typing-cursor"></span>
      </div>
      <div id="shareHeader" class="share-only">✨ 我的专属命运星盘 ✨</div>
      <div id="shareFooter" class="share-only">扫码或访问 tarotwheel.top 开启占卜</div>
    </div>
    
    <div style="margin-top: 30px; display: none; justify-content: center; gap: 15px;" id="actionBtns">
      <button id="saveBtn" class="save-btn" onclick="saveAsImage()">📸 保存专属卡片</button>
      <button id="restartBtn" class="save-btn restart" onclick="window.location.reload()">重新占卜</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
