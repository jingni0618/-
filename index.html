<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 塔罗占星师</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

  <canvas id="starfield"></canvas>
  <audio id="bgMusic" loop src="https://assets.codepen.io/1468070/ambient-space.mp3" preload="auto"></audio>
  <audio id="drawSound" src="https://assets.codepen.io/1468070/card-flip.mp3" preload="auto"></audio>
  <audio id="revealSound" src="https://assets.codepen.io/1468070/chime.mp3" preload="auto"></audio>

  <button id="musicToggle" class="music-btn" onclick="toggleMusic()">🎵 开启灵性环境音</button>

  <div class="container" id="captureArea">
    <h1>✨ 命运的星盘</h1>
    <p class="subtitle">倾听宇宙的回音，洞见灵魂的轨迹</p>

    <!-- 控制面板 -->
    <div class="control-panel" id="controlPanel">
      <div class="input-group">
        <label>你心中的疑惑是什么？</label>
        <input type="text" id="questionInput">
      </div>
      
      <div class="input-group">
        <label>请选择你要使用的牌阵：</label>
        <select id="spreadSelect" onchange="renderSpread()">
          <optgroup label="免费阵法 (基础指引)">
            <option value="single">单牌神谕 (1张：每日指引)</option>
            <option value="yesno">是非决断阵 (3张：支持/反对/答案)</option>
            <option value="time">时间之流 (3张：过去/现在/未来)</option>
          </optgroup>
          <optgroup label="👑 深度专栏 (解锁可见)">
            <option value="relationship">情感/关系阵 (4张：你/对方/阻碍/未来)</option>
            <option value="cross">灵感十字阵 (5张：核心/阻碍/目标/潜意识/结局)</option>
          </optgroup>
        </select>
      </div>
      <button id="startBtn" class="main-btn" onclick="checkVipAndStart()">开始洗牌与展开</button>
    </div>

    <!-- VIP 打赏弹窗 -->
    <div id="vipModal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <h3>👑 解锁深度命盘</h3>
        <p>您选择的是高级牌阵，宇宙需要交换更多的能量。</p>
        <p style="font-size: 13px; color: #a8b2d1;">（演示阶段：请点击“已赞赏”直接体验）</p>
        <div class="qr-placeholder">📱 这里放你的微信赞赏码</div>
        <div class="modal-btns">
          <button onclick="closeVipModal()" class="cancel-btn">返回</button>
          <button onclick="confirmVip()" class="confirm-btn">我已赞赏，开启占卜</button>
        </div>
      </div>
    </div>

    <!-- 冥想呼吸遮罩 (增强仪式感) -->
    <div id="meditationOverlay" class="meditation-overlay" style="display: none;">
      <div class="breathe-circle"></div>
      <p class="breathe-text">深呼吸...将精神集中在你的问题上...</p>
    </div>

    <!-- 洗牌交互区 -->
    <div id="deckArea" class="deck-area" style="display: none;">
      <h3 id="instructionText" class="ritual-text">凭直觉抽取 <span id="cardsLeft">0</span> 张牌</h3>
      <div class="fan-deck" id="fanDeck"></div>
    </div>

    <!-- 牌阵展示区 -->
    <div class="spread-container" id="spreadContainer"></div>

    <!-- 打字机流式输出报告区 -->
    <div class="reading-wrapper" id="readingWrapper">
      <div class="reading-box" id="readingBox">
        <h4 style="margin-top:0; color:#d4af37;">🌌 星空的启示正在生成...</h4>
        <div id="streamContent" class="stream-content"></div>
        <span id="cursor" class="typing-cursor"></span>
      </div>
      <div id="shareHeader" class="share-only">✨ 我的星空启示 · AI塔罗占星师 ✨</div>
      <div id="shareFooter" class="share-only">扫码或访问 tarotwheel.top 开启你的占卜</div>
    </div>
    
    <div style="margin-top: 20px;">
      <button id="saveBtn" class="save-btn" style="display: none;" onclick="saveAsImage()">📸 保存专属命运卡片</button>
      <button id="restartBtn" class="save-btn restart" style="display: none; margin-left: 15px;" onclick="window.location.reload()">重新占卜</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
