<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 塔罗占星师</title>
  <link rel="stylesheet" href="style.css">
  <!-- 引入截屏插件，用于生成专属卡片 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

  <!-- 背景：动态星空 -->
  <canvas id="starfield"></canvas>

  <!-- 全局音效 -->
  <audio id="bgMusic" loop src="https://assets.codepen.io/1468070/ambient-space.mp3" preload="auto"></audio>
  <audio id="drawSound" src="https://assets.codepen.io/1468070/card-flip.mp3" preload="auto"></audio>
  <audio id="revealSound" src="https://assets.codepen.io/1468070/chime.mp3" preload="auto"></audio>

  <!-- 右上角环境音开关 -->
  <button id="musicToggle" class="music-btn" onclick="toggleMusic()">🎵 开启灵性环境音</button>

  <div class="container" id="captureArea">
    <h1>✨ 命运的星盘</h1>
    <p class="subtitle">倾听宇宙的回音，洞见灵魂的轨迹</p>

    <!-- 控制面板：输入问题与选择牌阵 -->
    <div class="control-panel" id="controlPanel">
      <div class="input-group">
        <label>你心中的疑惑是什么？</label>
        <input type="text" id="questionInput" placeholder="越具体，星空的启示越清晰...">
      </div>
      
      <div class="input-group">
        <label>请选择你要使用的牌阵：</label>
        <select id="spreadSelect" onchange="renderSpread()">
          <option value="single">单牌神谕 (1张：每日指引/核心启示)</option>
          <option value="yesno">是非决断阵 (3张：支持、反对、最终答案)</option>
          <option value="time">时间之流 (3张：过去、现在、未来)</option>
          <option value="relationship" selected>情感/关系阵 (4张：你、对方、阻碍、未来)</option>
          <option value="cross">灵感十字阵 (5张：现状、阻碍、目标、潜意识、未来)</option>
        </select>
      </div>

      <button id="startBtn" class="main-btn" onclick="startRitual()">开始仪式：洗牌与展开</button>
    </div>

    <!-- 洗牌摊牌区：交互式抽牌 (初始隐藏) -->
    <div id="deckArea" class="deck-area" style="display: none;">
      <h3 id="instructionText" class="ritual-text">请闭上眼睛默念问题，凭直觉抽取 <span id="cardsLeft">4</span> 张牌</h3>
      <!-- 这里将用 JS 动态生成呈扇形排开的扑克牌 -->
      <div class="fan-deck" id="fanDeck"></div>
    </div>

    <!-- 牌阵展示区：被抽中的牌飞到这里 -->
    <div class="spread-container" id="spreadContainer"></div>

    <!-- 加载动画和解读结果区域 -->
    <div id="loadingBox" class="loading-box">🌌 宇宙磁场连接中，星空正在落笔...</div>
    
    <!-- 解读报告盒子 (带水印) -->
    <div class="reading-wrapper" id="readingWrapper">
      <div class="reading-box" id="readingBox"></div>
      <!-- 截图专属水印 (平时隐藏) -->
      <div id="shareHeader" class="share-only">✨ 我的星空启示 · AI塔罗占星师 ✨</div>
      <div id="shareFooter" class="share-only">扫码或访问 tarotwheel.vercel.app 开启你的占卜</div>
    </div>
    
    <!-- 保存与重置按钮 (解析完毕后出现) -->
    <div style="margin-top: 20px;">
      <button id="saveBtn" class="save-btn" style="display: none;" onclick="saveAsImage()">📸 保存专属命运卡片</button>
      <button id="restartBtn" class="save-btn restart" style="display: none; margin-left: 15px;" onclick="window.location.reload()">重新占卜</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
