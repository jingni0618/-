<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>👀仔的命运星盘</title>
  <link rel="stylesheet" href="src/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <!-- 永久性背景元素 -->
  <div id="nightOverlay"></div>
  <canvas id="starfield"></canvas>

  <!-- 音效 -->
  <audio id="bgMusic" loop src="https://cdn.pixabay.com/download/audio/2022/11/06/audio_29fb63d596.mp3"></audio>
  <audio id="drawSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_3d19114cb3.mp3"></audio>
  <audio id="revealSound" src="https://cdn.pixabay.com/download/audio/2022/02/10/audio_4d99430db6.mp3"></audio>

  <!-- 永久性UI元素 -->
  <div class="top-nav">
    <button id="musicToggle">🎵 灵性环境音</button>
    <button id="historyBtn">📜 占卜记录</button>
  </div>

  <!-- 主视图容器：所有动态内容将在此渲染 -->
  <main id="app-view"></main>

  <!-- 侧边栏/模态框 (可独立于主视图管理) -->
  <div id="historyPanel" class="aside-panel" style="display: none;"></div>
  <div id="vipModal" class="modal-overlay" style="display: none;"></div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
