<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 塔罗占星师</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

  <!-- 深夜模式遮罩 -->
  <div id="nightOverlay" class="night-overlay"></div>
  <canvas id="starfield"></canvas>

  <!-- 音效统管 (修复播放问题) -->
  <audio id="bgMusic" loop src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_244dc1f162.mp3"></audio>
  <audio id="drawSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3"></audio>
  <audio id="revealSound" src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_dc39bde807.mp3"></audio>

  <!-- 顶部操作栏 -->
  <div class="top-nav">
    <button id="musicToggle" class="icon-btn" onclick="toggleMusic()">🎵 静音</button>
  </div>

  <div class="container" id="mainContainer">
    
    <!-- 💡 痛点三解决：首屏 C 位的“今日神谕”入口 -->
    <div class="daily-entrance" id="dailyEntrance">
      <div class="daily-halo"></div>
      <h3>✨ 抽取今日命运签</h3>
      <p>无需困惑，倾听宇宙今天想对你说的话</p>
      <button class="daily-btn" onclick="startDailyDraw()">开启今日指引</button>
    </div>

    <!-- 深度占卜区 -->
    <div class="divination-section" id="divinationSection">
      <h1 id="mainTitle">命运星盘</h1>
      <p id="mainSubtitle" class="subtitle">在迷茫时，向星空提问</p>

      <!-- 控制面板 -->
      <div class="control-panel" id="controlPanel">
        <div class="input-group">
          <label>你心中的疑惑是什么？</label>
          <input type="text" id="questionInput" placeholder="越具体，星空的启示越深刻...">
        </div>
        
        <div class="input-group">
          <label>请选择星空牌阵：</label>
          <select id="spreadSelect" onchange="renderSpread()">
            <optgroup label="基础指引 (免费体验)">
              <option value="single">单牌神谕 (1张：直觉指引)</option>
              <option value="yesno">是非决断阵 (3张：支持/反对/答案)</option>
              <option value="time">时间之流 (3张：过去/现在/未来)</option>
            </optgroup>
            <optgroup label="👑 深度专栏 (能量交换)">
              <option value="relationship">情感透视阵 (4张：你/对方/阻碍/未来)</option>
              <option value="career">财富事业阵 (4张：现状/机遇/风险/走向)</option>
              <option value="choice">二选一岔路阵 (5张：现状/选A/选B/A结局/B结局)</option>
              <option value="cross" selected>灵感十字阵 (5张：核心/阻碍/目标/潜意识/结局)</option>
            </optgroup>
          </select>
        </div>
        <button id="startBtn" class="main-btn" onclick="checkVipAndStart()">开始净化与洗牌</button>
      </div>
    </div>

    <!-- 💡 痛点五解决：神级交互打赏弹窗 -->
    <div id="vipModal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <h3>👑 深度命盘解锁</h3>
        <p style="font-size: 14px; margin-bottom: 10px; color: #a8b2d1;">高级牌阵将触发超长专业解析，宇宙需要等价的能量交换。</p>
        
        <div class="qr-container">
          <img id="qrImage" src="https://i.postimg.cc/vBRq8rJn/IMG-9022.jpg" alt="微信赞赏码">
        </div>
        
        <!-- 移动端神级体验按钮 -->
        <button id="mobilePayBtn" class="confirm-btn pulse-btn" style="margin-top: 15px; width: 100%;" onclick="mobilePayFlow()">📱 保存收款码并前往微信赞赏 1 元</button>
        
        <!-- PC 端或回退按钮 -->
        <div class="modal-btns" style="margin-top: 15px;">
          <button onclick="closeVipModal()" class="cancel-btn">返回修改</button>
          <button id="pcPayBtn" onclick="pcPayFlow()" class="confirm-btn" style="display: none;">✅ 我已扫码赞赏</button>
        </div>
      </div>
    </div>

    <!-- 💡 洗牌与冥想动画 -->
    <div id="shuffleArea" class="deck-area" style="display: none; align-items: center; justify-content: center; flex-direction: column;">
       <h3 class="ritual-text" style="animation: pulseText 1s infinite;">洗牌中...将潜意识注入星盘</h3>
       <div class="shuffling-deck"></div>
    </div>

    <div id="meditationOverlay" class="meditation-overlay" style="display: none;">
      <div class="breathe-circle"></div>
      <p id="breatheText" class="breathe-text">深呼吸...专注你的问题...</p>
    </div>

    <!-- 交互抽牌区 -->
    <div id="deckArea" class="deck-area" style="display: none;">
      <h3 id="instructionText" class="ritual-text">请划动抽取 <span id="cardsLeft">0</span> 张牌</h3>
      <div class="fan-deck" id="fanDeck"></div>
    </div>

    <!-- 朋友圈日签专属展示区 -->
    <div id="dailyCardArea" class="daily-card-area" style="display: none;">
        <div class="daily-title">今日神谕</div>
        <div class="daily-date" id="dailyDate"></div>
        <div class="daily-emoji-card">
           <div id="dailyEmoji" class="daily-emoji">✨</div>
           <div id="dailyName" class="daily-name">牌名</div>
        </div>
        <div class="daily-quote" id="dailyQuote">正在连线宇宙生成箴言...</div>
    </div>

    <!-- 常规牌阵展示区 -->
    <div class="spread-container" id="spreadContainer"></div>

    <!-- 💡 痛点一解决：陪伴式大模型流式输出区 -->
    <div class="reading-wrapper" id="readingWrapper" style="display: none;">
      <div class="reading-box" id="readingBox">
        <div class="ai-status" id="aiStatus">
          <div class="crystal-ball">🔮</div>
          <span style="color:#f9d342; font-weight:bold; letter-spacing:1px;">塔罗师正在为你推演星象...</span>
        </div>
        <div id="streamContent" class="stream-content"></div>
        <span id="cursor" class="typing-cursor"></span>
      </div>
    </div>
    
    <div style="margin-top: 30px; display: none; justify-content: center; gap: 15px;" id="actionBtns">
      <!-- 💡 痛点二解决：海报级截图专属包裹区 (不可见，仅用于截图) -->
      <div id="posterCaptureArea" class="poster-capture-area">
         <div class="poster-header">✨ 我的星空启示 ✨</div>
         <div class="poster-question" id="posterQuestion"></div>
         <div class="poster-cards" id="posterCards"></div>
         <div class="poster-quote" id="posterQuote"></div>
         <div class="poster-footer">测算于 AI塔罗星盘 (tarotwheel.top)</div>
      </div>
      <button id="saveBtn" class="save-btn" onclick="generateHighEndPoster()">📸 生成专属命运海报</button>
      <button id="restartBtn" class="save-btn restart" onclick="window.location.reload()">重新占卜</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
