<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 塔罗占星师</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

  <!-- 星空与深夜遮罩 -->
  <div id="nightOverlay" class="night-overlay"></div>
  <canvas id="starfield"></canvas>

  <!-- 音效统管 -->
  <audio id="bgMusic" loop src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_244dc1f162.mp3"></audio>
  <audio id="drawSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3"></audio>
  <audio id="revealSound" src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_dc39bde807.mp3"></audio>

  <!-- 需要在沉浸模式下隐藏的所有 UI 元素都包裹在这里 -->
  <div id="uiElements" class="ui-wrapper">
    <div class="top-nav">
      <button id="musicToggle" class="icon-btn" onclick="toggleMusic()">🎵 灵性环境音</button>
      <button id="dailyBtn" class="icon-btn highlight" onclick="startDailyDraw()">✨ 今日神谕签</button>
    </div>

    <div class="container">
      <h1 id="mainTitle" class="classic-title">命运的星盘</h1>
      <p id="mainSubtitle" class="subtitle">倾听宇宙的回音，洞见灵魂的轨迹</p>

      <!-- 灵魂灵数计算器 -->
      <div class="soul-calc-box">
        <label>✨ 测算你的灵魂专属塔罗 (选填)</label>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <input type="text" id="birthInput" placeholder="输入出生年月日 (如 19950821)" maxlength="8">
          <button class="small-gold-btn" onclick="calculateSoulCard()">计算</button>
        </div>
        <div id="soulCardResult" class="soul-result" style="display: none;"></div>
      </div>

      <!-- 控制面板 -->
      <div class="control-panel" id="controlPanel">
        <div class="input-group">
          <label>你心中的疑惑是什么？</label>
          <input type="text" id="questionInput" placeholder="越具体，星空的启示越深刻...">
        </div>
        
        <div class="input-group">
          <label>请选择星空牌阵：</label>
          <select id="spreadSelect" onchange="renderSpread()">
            <optgroup label="基础指引 (免费体验)">
              <option value="single">单牌神谕 (1张：直觉指引)</option>
              <option value="yesno">是非决断阵 (3张：支持/反对/答案)</option>
              <option value="time">时间之流 (3张：过去/现在/未来)</option>
            </optgroup>
            <optgroup label="👑 深度专栏 (能量交换)">
              <option value="relationship">情感透视阵 (4张：你/对方/阻碍/未来)</option>
              <option value="career">财富事业阵 (4张：现状/机遇/风险/走向)</option>
              <option value="choice">二选一岔路阵 (5张：现状/选A/选B/A结局/B结局)</option>
              <option value="cross" selected>灵感十字阵 (5张：核心/阻碍/目标/潜意识/结局)</option>
            </optgroup>
          </select>
        </div>
        <button id="startBtn" class="main-btn" onclick="checkVipAndStart()">进入冥想与洗牌</button>
      </div>
    </div>
  </div> <!-- uiElements 结束 -->

  <!-- VIP 赞赏弹窗 -->
  <div id="vipModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h3 class="classic-title" style="font-size: 1.5rem; margin-top:0;">👑 解锁深度命盘</h3>
      <p style="font-size: 13px; margin-bottom: 10px; color: #a8b2d1;">高级牌阵将触发千字专业长文解析，请交换一点能量以开启星空指引。</p>
      <p style="font-size: 14px; color: #c5a059; font-weight: bold; margin-bottom: 15px;">👉 扫码或长按赞赏 1 元</p>
      <div class="qr-container"><img id="qrImage" src="https://i.postimg.cc/vBRq8rJn/IMG-9022.jpg" alt="微信赞赏码"></div>
      <button id="mobilePayBtn" class="confirm-btn pulse-btn" style="margin-top: 15px; width: 100%; display:none;" onclick="mobilePayFlow()">📱 保存二维码并前往微信</button>
      <div class="modal-btns" style="margin-top: 15px;">
        <button onclick="closeVipModal()" class="cancel-btn">返回修改</button>
        <button id="pcPayBtn" onclick="pcPayFlow()" class="confirm-btn">✅ 我已赞赏，开启</button>
      </div>
    </div>
  </div>

  <!-- 沉浸式动画区 (洗牌、划牌、展牌) -->
  <div class="immersive-container">
    
    <div id="shuffleArea" class="deck-area" style="display: none;">
       <h3 class="ritual-text">洗牌中...将潜意识注入星盘</h3>
       <div class="shuffling-deck"></div>
    </div>

    <!-- 交互抽牌区 -->
    <div id="deckArea" class="deck-area" style="display: none;">
      <h3 id="instructionText" class="ritual-text">请划动抽取 <span id="cardsLeft">0</span> 张牌</h3>
      <div class="fan-deck" id="fanDeck"></div>
    </div>

    <!-- 悬念揭秘与牌阵区 -->
    <div id="revealInstruction" class="ritual-text" style="display: none; margin-top: 20px;">命运已就位，请依次点击牌背揭晓...</div>
    <div class="spread-container" id="spreadContainer"></div>

    <!-- 羊皮纸长文解析区 -->
    <div class="reading-wrapper" id="readingWrapper" style="display: none;">
      <div class="parchment-box" id="readingBox">
        <div class="ai-status" id="aiStatus">
          <div class="crystal-ball">🔮</div>
          <span>大师正在为你推演星象...</span>
        </div>
        <div id="streamContent" class="stream-content parchment-text"></div>
        <span id="cursor" class="typing-cursor"></span>
      </div>
      <div id="shareHeader" class="share-only" style="color: #2c241b; font-weight: bold; margin-bottom: 20px;">✨ 命运星盘 · 专属占卜报告 ✨</div>
    </div>
    
    <div id="actionBtns" style="margin-top: 30px; display: none; justify-content: center; gap: 15px; padding-bottom: 50px;">
      <button id="saveBtn" class="save-btn" onclick="saveAsImage()">📸 保存羊皮卷轴</button>
      <button id="restartBtn" class="save-btn restart" onclick="window.location.reload()">重新占卜</button>
    </div>
  </div>

  <!-- 朋友圈日签专属展示区 (初始隐藏) -->
  <div id="dailyCardArea" class="daily-card-area" style="display: none;">
      <div class="daily-title">今日神谕</div>
      <div class="daily-date" id="dailyDate"></div>
      <div class="daily-emoji-card">
         <div id="dailyEmoji" class="daily-emoji">✨</div>
         <div id="dailyName" class="daily-name">牌名</div>
      </div>
      <div class="daily-quote" id="dailyQuote">正在连线宇宙生成箴言...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
